name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install system dependencies (tkinter GUI + virtual display)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest-rerunfailures

      # Fails fast, before spending time on the test jobs below. Only the
      # default rule set (unused imports/variables, undefined names,
      # syntax errors) -- see pyproject.toml for why line-length isn't
      # enforced.
      - name: Lint (ruff)
        run: ruff check .

      # Split into a few separate `pytest` processes rather than one big
      # run: the GUI/mount tests spin up a lot of real threads (per-mock
      # sim loops, MountWorker/CameraWorker/SafetyGuard threads, response
      # timers), and running all ~260 of them in a single process has a
      # real, reproducible chance of an interpreter-level abort under that
      # much thread churn (observed directly during development, not
      # hypothetical). Each `pytest` invocation below starts a fresh
      # process, which avoids the cumulative thread count that triggers it.
      # --reruns handles a single real-time convergence test that's
      # occasionally slow under CI's shared CPU, independent of the above.
      - name: Run core/astronomy tests (no Tk, no threads)
        run: >
          pytest tests/test_angles.py tests/test_constellations.py
          tests/test_ephemeris.py tests/test_optics.py tests/test_protocol.py
          tests/test_clock_sync.py tests/test_guiding.py
          tests/test_ser_writer.py tests/test_ser_reader.py tests/test_fits_writer.py
          tests/test_live_input.py tests/test_mock_camera.py
          tests/test_camera_worker.py -v

      - name: Run mount/tracker tests (real threads, no Tk)
        run: pytest tests/test_mount.py tests/test_tracker.py -v

      - name: Run GUI tests (Tk + threads, under a virtual display)
        run: >
          xvfb-run -a pytest --reruns 1 --reruns-delay 2
          tests/test_gui_worker.py tests/test_gui_panels.py
          tests/test_gui_app.py tests/test_jog_window.py
          tests/test_gui_dialogs.py tests/test_gui_ser_player.py -v
